[build-system]
requires = ["setuptools>=61.0", "wheel", "pybind11>=2.13.0"]
build-backend = "setuptools.build_meta"

[project]
name = "omnicrop"
version = "1.0.0"
description = "High-performance iterative cropping engine based on C++ and DIoU."
readme = "README.md"
requires-python = ">=3.8"
license = {text = "MIT"}
authors = [{name = "leon"}]

[tool.setuptools]
# 包含 omnicrop 这个 Python 包文件夹
packages = ["omnicrop"]
include-package-data = true

[[tool.setuptools.ext-modules]]
name = "omnicrop._omnicrop_backend"
# 修正路径：指向 src 文件夹下的文件
sources = ["src/bindings.cpp"]
include-dirs = ["src"]
language = "c++"

[tool.cibuildwheel]
environment = { CXXFLAGS="-std=c++11" }
before-build = "pip install 'pybind11>=2.13.0'"
build-verbosity = "1"