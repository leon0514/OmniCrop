[build-system]
requires = ["setuptools>=61.0", "wheel", "pybind11>=2.13.0"]
build-backend = "setuptools.build_meta"

[project]
name = "omnicrop"
version = "1.0.0"
description = "High-performance iterative cropping engine based on C++ and DIoU."
readme = "README.md"
requires-python = ">=3.8"
license = {text = "MIT"}
authors = [{name = "Your Name"}]

[tool.setuptools]
# 显式指定包含的文件
include-package-data = true

[tool.setuptools.ext-modules]
# 关键部分：定义扩展模块
"_omnicrop_backend" = {sources = ["bindings.cpp"], include-dirs = ["."], language = "c++"}

[tool.cibuildwheel]
# 为所有平台设置 C++ 标准
environment = { CXXFLAGS="-std=c++11" }
# 构建前确认安装依赖
before-build = "pip install 'pybind11>=2.13.0'"
# 构建输出详细程度
build-verbosity = "1"